<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peta Distribusi Tim — Kab. Probolinggo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

  /* ── HEADER ── */
  header {
    background: #0f3460;
    color: white;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 1000;
  }
  .header-title h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; line-height: 1.2; }
  .header-title p  { font-size: 11px; opacity: 0.7; margin-top: 1px; }
  .header-stats { display: flex; gap: 10px; flex-shrink: 0; }
  .hstat { text-align: center; min-width: 36px; }
  .hstat-num { font-size: 17px; font-weight: 700; line-height: 1; }
  .hstat-lbl { font-size: 9px; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 1px; }

  /* ── MAP ── */
  #map-wrap { flex: 1; position: relative; overflow: hidden; }
  #map { width: 100%; height: 100%; }

  /* ── FLOATING SEARCH BAR (mobile top) ── */
  #search-bar {
    position: absolute;
    top: 10px; left: 10px; right: 10px;
    z-index: 900;
    display: flex;
    gap: 8px;
  }
  #search-input {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 13px;
    outline: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    background: white;
  }
  #filter-btn {
    background: #0f3460;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #filter-btn svg { width: 14px; height: 14px; fill: white; }
  #filter-btn.has-filter { background: #D85A30; }

  /* ── BOTTOM SHEET ── */
  #bottom-sheet {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
    z-index: 950;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    max-height: 75dvh;
    display: flex;
    flex-direction: column;
    will-change: transform;
  }
  #bottom-sheet.open { transform: translateY(0); }

  .sheet-handle-bar {
    display: flex;
    justify-content: center;
    padding: 10px 0 6px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .sheet-handle { width: 36px; height: 4px; background: #ddd; border-radius: 4px; }

  .sheet-header {
    padding: 0 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .sheet-header h2 { font-size: 14px; font-weight: 700; color: #111; }
  #close-sheet {
    background: #f0f0f0;
    border: none;
    border-radius: 50%;
    width: 28px; height: 28px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #555;
  }

  /* Legend row */
  .legend-row {
    display: flex;
    gap: 14px;
    padding: 10px 16px;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Kec list */
  #kec-list-wrap {
    overflow-y: auto;
    flex: 1;
    padding: 10px 12px 20px;
    -webkit-overflow-scrolling: touch;
  }
  .kec-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    text-align: left;
    font-size: 13px;
    color: #333;
    background: transparent;
    border: 1px solid #e8e8e8;
    border-radius: 9px;
    padding: 10px 12px;
    cursor: pointer;
    margin-bottom: 6px;
    transition: all 0.15s;
  }
  .kec-btn:active { background: #f0f6ff; }
  .kec-btn.active { background: #e6f1fb; color: #185FA5; border-color: #378ADD; font-weight: 600; }
  .kec-count { background: #f0f0f0; border-radius: 10px; padding: 2px 8px; font-size: 11px; color: #777; flex-shrink: 0; }
  .kec-btn.active .kec-count { background: #b5d4f4; color: #185FA5; }

  /* ── DESKTOP SIDEBAR (≥768px) ── */
  @media (min-width: 768px) {
    body { flex-direction: row; }
    header {
      display: none; /* integrated into sidebar */
    }

    /* On desktop, show full layout */
    #layout-wrap {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100dvh;
    }

    #sidebar-desktop {
      display: flex !important;
    }

    #map-wrap {
      flex: 1;
    }

    #search-bar { display: none !important; }
    #bottom-sheet { display: none !important; }
    #mobile-header { display: none !important; }
  }

  /* ── DESKTOP SIDEBAR ── */
  #sidebar-desktop {
    width: 250px;
    background: white;
    border-right: 1px solid #e5e5e5;
    overflow: hidden;
    flex-shrink: 0;
    display: none;
    flex-direction: column;
  }

  .sd-header {
    background: #0f3460;
    color: white;
    padding: 14px 16px;
    flex-shrink: 0;
  }
  .sd-header h1 { font-size: 14px; font-weight: 600; }
  .sd-header p  { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .sd-stats { display: flex; gap: 12px; margin-top: 10px; }
  .sd-stat { text-align: center; }
  .sd-stat-num { font-size: 18px; font-weight: 700; }
  .sd-stat-lbl { font-size: 9px; opacity: 0.65; text-transform: uppercase; }

  .sd-section { padding: 12px 14px 8px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
  .sd-section h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #999; margin-bottom: 7px; }

  #sd-search {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 7px;
    padding: 7px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  #sd-search:focus { border-color: #378ADD; }

  .sd-legend { display: flex; flex-direction: column; gap: 5px; }
  .sd-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #444; }
  .sd-legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

  #sd-kec-list { overflow-y: auto; flex: 1; padding: 10px 10px 16px; }
  .sd-kec-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    text-align: left;
    font-size: 12px;
    color: #333;
    background: transparent;
    border: 1px solid #e8e8e8;
    border-radius: 7px;
    padding: 7px 10px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: all 0.15s;
  }
  .sd-kec-btn:hover { background: #f0f6ff; border-color: #b3d0f5; }
  .sd-kec-btn.active { background: #e6f1fb; color: #185FA5; border-color: #378ADD; font-weight: 600; }
  .sd-kec-count { background: #f0f0f0; border-radius: 10px; padding: 1px 7px; font-size: 11px; color: #666; }
  .sd-kec-btn.active .sd-kec-count { background: #b5d4f4; color: #185FA5; }

  /* Leaflet popup */
  .popup-card { min-width: 190px; font-family: 'Segoe UI', sans-serif; }
  .kec-tooltip { background: rgba(255,255,255,0.93); border: 1px solid #aac4e0; border-radius: 5px; font-size: 11px; font-weight: 600; color: #1a4a7a; padding: 3px 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  .popup-badge { display: inline-block; font-size: 10px; padding: 2px 9px; border-radius: 20px; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-school { background: #E6F1FB; color: #185FA5; }
  .badge-nginap { background: #EAF3DE; color: #3B6D11; }
  .badge-posko  { background: #FAECE7; color: #993C1D; }
  .popup-title { font-size: 13px; font-weight: 700; color: #111; margin-bottom: 5px; }
  .popup-row { font-size: 12px; color: #555; margin-bottom: 3px; }
  .popup-row b { color: #333; }

  /* Bottom bar desktop only */
  .bottom-bar {
    display: none;
  }
  @media (min-width: 768px) {
    .bottom-bar {
      display: block;
      background: white;
      border-top: 1px solid #e5e5e5;
      padding: 7px 16px;
      font-size: 11px;
      color: #aaa;
      flex-shrink: 0;
    }
  }

  /* Overlay to close sheet */
  #sheet-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 940;
  }
  #sheet-overlay.show { display: block; }
</style>

    <!-- Sheet overlay -->

    <!-- Bottom sheet -->
    <div id="bottom-sheet">

      </div>
      <div class="sheet-header">
        <h2>Filter Kecamatan</h2>

      <div class="legend-row">

      <div id="kec-list-wrap">

  </div>

</div>

const KEC_COLORS = ["#1a6fa8","#2e8b57","#c0392b","#8e44ad","#d35400","#16a085","#2980b9","#27ae60","#e74c3c","#9b59b6","#f39c12","#1abc9c","#e67e22","#3498db","#2ecc71","#e91e63","#00bcd4","#ff5722","#607d8b","#795548","#ff9800","#9c27b0","#4caf50","#f44336"];

let kecLayerGroup = L.layerGroup().addTo(map);

function drawBoundaries(highlightKec) {
  kecLayerGroup.clearLayers();
  KEC_GEOJSON.features.forEach((f, i) => {
    const nama = f.properties.kecamatan;
    const isH = highlightKec && nama === highlightKec;
    const color = KEC_COLORS[i % KEC_COLORS.length];
    const layer = L.geoJSON(f, {
      style: { color: isH ? color : "#2d6aa0", weight: isH ? 3 : 1.2, opacity: isH ? 1 : 0.6, fillColor: isH ? color : "#4a90d9", fillOpacity: isH ? 0.18 : 0.04, dashArray: isH ? null : "5 4" }
    });
    layer.bindTooltip(nama, { permanent: false, sticky: true, className: 'kec-tooltip', direction: 'center' });
    const center = layer.getBounds().getCenter();
    const label = L.marker(center, {
      icon: L.divIcon({
        className: '',
        html: `<div style="font-size:9px;font-weight:700;color:${isH?color:'#2d6aa0'};white-space:nowrap;text-shadow:0 0 4px white,0 0 4px white;transform:translate(-50%,-50%);pointer-events:none;">${nama.toUpperCase()}</div>`,
        iconSize: [0,0], iconAnchor: [0,0]
      }), interactive: false
    });
    kecLayerGroup.addLayer(layer);
    kecLayerGroup.addLayer(label);
  });
}
drawBoundaries(null);

let activeMarkers = [];
let activeKec = null;

function popupHTML(d) {
  return `<div class="popup-card">
    <div class="popup-badge ${BADGES[d.kat]||'badge-posko'}">${d.kat}</div>
    <div class="popup-title">${d.nama}</div>
    <div class="popup-row"><b>Kecamatan:</b> ${d.kec}</div>
    <div class="popup-row"><b>Tim:</b> ${d.tim}</div>
  </div>`;
}

function updateStats(s,n,p) {
  const total = s+n+p;
  ['h-total','sd-total'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=total; });
  ['h-school','sd-school'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=s; });
  ['h-nginap','sd-nginap'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=n; });
  ['h-posko','sd-posko'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=p; });
}

function render(filterKec, filterSearch) {
  activeMarkers.forEach(m => map.removeLayer(m));
  activeMarkers = [];
  let s=0, n=0, p=0;
  DATA.forEach(d => {
    const matchKec = !filterKec || d.kec === filterKec;
    const q = (filterSearch||"").toLowerCase();
    const matchSearch = !q || d.nama.toLowerCase().includes(q) || d.kec.toLowerCase().includes(q) || d.kat.toLowerCase().includes(q);
    if (!matchKec || !matchSearch) return;
    const m = L.marker([d.lat, d.lng], { icon: pinIcon(d.kat) }).addTo(map).bindPopup(popupHTML(d), { maxWidth: 240 });
    activeMarkers.push(m);
    if (d.kat==="Sekolah") s++;
    if (d.kat==="Penginapan") n++;
    if (d.kat==="Posko Tim") p++;
  });
  updateStats(s,n,p);
}

// ── Build kec buttons (shared logic) ──
const allKec = [...new Set(DATA.map(d => d.kec))].sort();
const kecCount = {};
DATA.forEach(d => kecCount[d.kec] = (kecCount[d.kec]||0)+1);

function makeKecButton(label, kec, isDesktop) {
  const btn = document.createElement('button');
  const cls = isDesktop ? 'sd-kec-btn' : 'kec-btn';
  btn.className = cls + (kec === null ? ' active' : '');
  const cntCls = isDesktop ? 'sd-kec-count' : 'kec-count';
  const cnt = kec === null ? DATA.length : kecCount[kec];
  btn.innerHTML = `<span>${label}</span><span class="${cntCls}">${cnt}</span>`;
  btn.onclick = () => {
    activeKec = kec;
    // Update both mobile & desktop buttons
    document.querySelectorAll(`.kec-btn, .sd-kec-btn`).forEach(b => b.classList.remove('active'));
    // Find matching button in both lists and activate
    document.querySelectorAll(`.kec-btn, .sd-kec-btn`).forEach(b => {
      const spanText = b.querySelector('span:first-child')?.textContent;
      if (spanText === label) b.classList.add('active');
    });
    render(activeKec, getMobileSearch() || getDesktopSearch());
    drawBoundaries(kec);
    // Update filter button indicator
    document.getElementById('filter-btn').classList.toggle('has-filter', kec !== null);
    if (kec !== null) {
      const pts = DATA.filter(d => d.kec === kec);
      if (pts.length) map.flyTo([pts[0].lat, pts[0].lng], 13, { duration: 1 });
    } else {
      map.flyTo([-7.838, 113.307], 10, { duration: 1 });
    }
    if (!isDesktop) closeSheet();
  };
  return btn;
}

const mobileKecList = document.getElementById('kec-list');
const desktopKecList = document.getElementById('sd-kec-list');

mobileKecList.appendChild(makeKecButton('Semua Kecamatan', null, false));
desktopKecList.appendChild(makeKecButton('Semua Kecamatan', null, true));
allKec.forEach(kec => {
  mobileKecList.appendChild(makeKecButton(kec, kec, false));
  desktopKecList.appendChild(makeKecButton(kec, kec, true));
});

function getMobileSearch() { return document.getElementById('search-input').value; }
function getDesktopSearch() { return document.getElementById('sd-search').value; }

document.getElementById('search-input').addEventListener('input', e => render(activeKec, e.target.value));
document.getElementById('sd-search').addEventListener('input', e => render(activeKec, e.target.value));

// ── Sheet controls ──
function toggleSheet() {
  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.getElementById('sheet-overlay');
  sheet.classList.toggle('open');
  overlay.classList.toggle('show');
}
function closeSheet() {
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('show');
}

// ── Responsive: show/hide desktop sidebar ──
function applyLayout() {
  const isDesktop = window.innerWidth >= 768;
  document.getElementById('sidebar-desktop').style.display = isDesktop ? 'flex' : 'none';
  document.getElementById('mobile-header').style.display  = isDesktop ? 'none' : 'flex';
  document.getElementById('search-bar').style.display     = isDesktop ? 'none' : 'flex';
  document.getElementById('bottom-sheet').style.display   = isDesktop ? 'none' : 'flex';
  document.getElementById('sheet-overlay').style.display  = isDesktop ? 'none' : (document.getElementById('sheet-overlay').classList.contains('show') ? 'block' : 'none');
  // Reflow map
  setTimeout(() => map.invalidateSize(), 50);
}
window.addEventListener('resize', applyLayout);
applyLayout();

render(null, '');
</script>
</body>
</html>
