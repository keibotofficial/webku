<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; display: flex; flex-direction: column; height: 100vh; }

  header {
    background: #0f3460;
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
  header p { font-size: 12px; opacity: 0.75; margin-top: 2px; }
  .header-stats { display: flex; gap: 16px; }
  .hstat { text-align: center; }
  .hstat-num { font-size: 20px; font-weight: 700; }
  .hstat-lbl { font-size: 10px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }

  #main { display: flex; flex: 1; overflow: hidden; }

  #sidebar {
    width: 240px;
    background: white;
    border-right: 1px solid #e5e5e5;
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .sidebar-section { padding: 14px 14px 10px; border-bottom: 1px solid #f0f0f0; }
  .sidebar-section h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #888; margin-bottom: 8px; }

  #search-input {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: #378ADD; }

  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #444; padding: 4px 0; }
  .legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }

  .kec-btn {
    display: block;
    width: 100%;
    text-align: left;
    font-size: 12px;
    color: #333;
    background: transparent;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: all 0.15s;
  }
  .kec-btn:hover { background: #f0f6ff; border-color: #b3d0f5; }
  .kec-btn.active { background: #e6f1fb; color: #185FA5; border-color: #378ADD; font-weight: 600; }
  .kec-count { float: right; background: #f0f0f0; border-radius: 10px; padding: 1px 7px; font-size: 11px; color: #666; }
  .kec-btn.active .kec-count { background: #b5d4f4; color: #185FA5; }

  #map { flex: 1; }

  .popup-card { min-width: 200px; font-family: 'Segoe UI', sans-serif; }
  .kec-tooltip { background: rgba(255,255,255,0.93); border: 1px solid #aac4e0; border-radius: 5px; font-size: 12px; font-weight: 600; color: #1a4a7a; padding: 3px 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  .popup-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-school { background: #E6F1FB; color: #185FA5; }
  .badge-nginap { background: #EAF3DE; color: #3B6D11; }
  .badge-posko  { background: #FAECE7; color: #993C1D; }
  .popup-title { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 6px; }
  .popup-row { font-size: 12px; color: #555; margin-bottom: 3px; }
  .popup-row b { color: #333; }

  .bottom-bar {
    background: white;
    border-top: 1px solid #e5e5e5;
    padding: 8px 16px;
    font-size: 12px;
    color: #888;
    flex-shrink: 0;
  }
</style>
</head>

  const c = customColor || COLORS[kat] || "#888";
  const svg = encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38" viewBox="0 0 30 38">
      <path fill="${c}" stroke="white" stroke-width="1.5" d="M15 0C7.27 0 1 6.27 1 14c0 10 14 24 14 24S29 24 29 14C29 6.27 22.73 0 15 0z"/>
      <circle fill="white" cx="15" cy="14" r="6"/>
    </svg>`
  );
  return L.icon({ iconUrl:"data:image/svg+xml,"+svg, iconSize:[30,38], iconAnchor:[15,38], popupAnchor:[0,-40] });
}

const map = L.map('map').setView([-7.838, 113.307], 10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ── GeoJSON dimuat dari file eksternal ──
// Ganti URL di bawah sesuai lokasi file kecamatan.geojson kamu
const GEOJSON_URL = 'kecamatan.geojson';

// Warna per kecamatan (highlight saat filter aktif)
const KEC_COLORS = [
  "#1a6fa8","#2e8b57","#c0392b","#8e44ad","#d35400",
  "#16a085","#2980b9","#27ae60","#e74c3c","#9b59b6",
  "#f39c12","#1abc9c","#e67e22","#3498db","#2ecc71",
  "#e91e63","#00bcd4","#ff5722","#607d8b","#795548",
  "#ff9800","#9c27b0","#4caf50","#f44336"
];

let kecLayerGroup = L.layerGroup().addTo(map);
let kecLayers = {};

function drawBoundaries(highlightKec) {
  if (!KEC_GEOJSON) return;
  kecLayerGroup.clearLayers();
  kecLayers = {};
  KEC_GEOJSON.features.forEach((f, i) => {
    const nama = f.properties.kecamatan;
    const isHighlight = highlightKec && nama === highlightKec;
    const color = KEC_COLORS[i % KEC_COLORS.length];
    const layer = L.geoJSON(f, {
      style: {
        color: isHighlight ? color : "#2d6aa0",
        weight: isHighlight ? 3 : 1.2,
        opacity: isHighlight ? 1 : 0.6,
        fillColor: isHighlight ? color : "#4a90d9",
        fillOpacity: isHighlight ? 0.20 : 0.04,
        dashArray: isHighlight ? null : "5 4"
      }
    });
    // Tooltip nama kecamatan saat hover
    layer.bindTooltip(nama, {
      permanent: false, sticky: true,
      className: 'kec-tooltip',
      direction: 'center'
    });
    // Label permanen di tengah wilayah
    const center = layer.getBounds().getCenter();
    const label = L.marker(center, {
      icon: L.divIcon({
        className: '',
        html: `<div style="font-size:9.5px;font-weight:700;color:${isHighlight?color:'#2d6aa0'};
               white-space:nowrap;text-shadow:0 0 4px white,0 0 4px white,0 0 4px white,0 0 4px white;
               transform:translate(-50%,-50%);pointer-events:none;letter-spacing:0.3px">${nama.toUpperCase()}</div>`,
        iconSize: [0,0], iconAnchor: [0,0]
      }),
      interactive: false
    });
    kecLayerGroup.addLayer(layer);
    kecLayerGroup.addLayer(label);
    kecLayers[nama] = layer;
  });
}

let activeMarkers = [];

// Fetch GeoJSON lalu inisialisasi peta
let KEC_GEOJSON = null;

async function loadGeoJSON() {
  try {
    const res = await fetch(GEOJSON_URL);
    if (!res.ok) throw new Error('Gagal memuat ' + GEOJSON_URL);
    KEC_GEOJSON = await res.json();
    drawBoundaries(null);
  } catch (err) {
    console.warn('GeoJSON tidak dapat dimuat:', err.message);
    // Tetap lanjut tanpa batas wilayah
  }
}

loadGeoJSON();
let activeKec = null;

function popupHTML(d) {
  return `<div class="popup-card">
    <div class="popup-badge ${BADGES[d.kat]||'badge-posko'}">${d.kat}</div>
    <div class="popup-title">${d.nama}</div>
    <div class="popup-row"><b>Kecamatan:</b> ${d.kec}</div>
    <div class="popup-row"><b>Info Tim:</b> ${d.tim}</div>
    <div class="popup-row" style="margin-top:6px;color:#999;font-size:11px">
      ${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}
    </div>
  </div>`;
}

function render(filterKec, filterSearch) {
  activeMarkers.forEach(m => map.removeLayer(m));
  activeMarkers = [];
  let s=0, n=0, p=0;
  DATA.forEach(d => {
    const matchKec = !filterKec || d.kec === filterKec;
    const q = (filterSearch||"").toLowerCase();
    const matchSearch = !q || d.nama.toLowerCase().includes(q) || d.kec.toLowerCase().includes(q) || d.kat.toLowerCase().includes(q);
    if (!matchKec || !matchSearch) return;
    const m = L.marker([d.lat, d.lng], { icon: pinIcon(d.kat, d.color || null) })
      .addTo(map)
      .bindPopup(popupHTML(d), { maxWidth: 260 });
    activeMarkers.push(m);
    if (d.kat==="Sekolah") s++;
    if (d.kat==="Penginapan") n++;
    if (d.kat==="Posko Tim") p++;
  });
  document.getElementById('h-total').textContent  = s+n+p;
  document.getElementById('h-school').textContent = s;
  document.getElementById('h-nginap').textContent = n;
  document.getElementById('h-posko').textContent  = p;
}

// Build kecamatan list
const kecList = document.getElementById('kec-list');
const allKec  = [...new Set(DATA.map(d => d.kec))].sort();
const kecCount = {};
DATA.forEach(d => kecCount[d.kec] = (kecCount[d.kec]||0)+1);

function makeBtn(label, kec) {
  const btn = document.createElement('button');
  btn.className = 'kec-btn' + (kec===null?' active':'');
  btn.innerHTML = label + `<span class="kec-count">${kec===null ? DATA.length : kecCount[kec]}</span>`;
  btn.onclick = () => {
    activeKec = kec;
    document.querySelectorAll('.kec-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(activeKec, document.getElementById('search-input').value);
    drawBoundaries(kec);
    if (kec !== null) {
      const pts = DATA.filter(d => d.kec === kec);
      if (pts.length) map.flyTo([pts[0].lat, pts[0].lng], 13, { duration: 1 });
    } else {
      map.flyTo([-7.838, 113.307], 10, { duration: 1 });
    }
  };
  return btn;
}

kecList.appendChild(makeBtn('Semua Kecamatan', null));
allKec.forEach(kec => kecList.appendChild(makeBtn(kec, kec)));

document.getElementById('search-input').addEventListener('input', e => {
  render(activeKec, e.target.value);
});

render(null, '');
</script>
</body>
</html>
